function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function CinematicChords() {
  const [selectedEmotion, setSelectedEmotion] = useState("Hope");
  const [voicing, setVoicing] = useState("triad");
  const [tempo, setTempo] = useState(1.0);
  const [activeProgression, setActiveProgression] = useState(null);
  const [playingChordIndex, setPlayingChordIndex] = useState(-1);
  const [expandedTheory, setExpandedTheory] = useState(null);
  const audioCtxRef = useRef(null);
  const playingRef = useRef(false);
  const stopRef = useRef(false);
  const nodesRef = useRef([]);
  const tempoRef = useRef(1.0);

  const getAudioCtx = useCallback(() => {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed") {
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtxRef.current.state === "suspended") audioCtxRef.current.resume();
    return audioCtxRef.current;
  }, []);

  const playChord = useCallback((ctx, notes, duration, startTime) => {
    const convolver = ctx.createConvolver();
    const rate = ctx.sampleRate;
    const len = rate * 3.5;
    const impulse = ctx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = impulse.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
    }
    convolver.buffer = impulse;
    const reverbGain = ctx.createGain();
    reverbGain.gain.value = 0.35;
    convolver.connect(reverbGain);
    reverbGain.connect(ctx.destination);
    const dryGain = ctx.createGain();
    dryGain.gain.value = 0.65;
    dryGain.connect(ctx.destination);

    notes.forEach((midi, i) => {
      const types = i === 0 ? ["sine", "triangle"] : i < 3 ? ["triangle", "sine"] : ["sine", "sine"];
      types.forEach((type, li) => {
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.type = type;
        osc.frequency.value = midiToFreq(midi) * (1 + (li === 1 ? 0.002 : 0));
        const baseVol = i === 0 ? 0.12 : i < notes.length - 1 ? 0.08 : 0.06;
        const vol = li === 1 ? baseVol * 0.35 : baseVol;
        env.gain.setValueAtTime(0, startTime);
        env.gain.linearRampToValueAtTime(vol, startTime + Math.min(0.18, duration * 0.15));
        env.gain.setValueAtTime(vol, startTime + Math.max(duration * 0.5, duration - 0.5));
        env.gain.exponentialRampToValueAtTime(0.001, startTime + duration + 0.3);
        osc.connect(env);
        env.connect(dryGain);
        env.connect(convolver);
        osc.start(startTime);
        osc.stop(startTime + duration + 0.5);
        nodesRef.current.push(osc);
      });
    });
  }, []);

  const stopPlayback = useCallback(() => {
    stopRef.current = true;
    nodesRef.current.forEach((n) => { try { n.stop(); } catch (e) {} });
    nodesRef.current = [];
    playingRef.current = false;
    setActiveProgression(null);
    setPlayingChordIndex(-1);
  }, []);

  const playProgression = useCallback(async (prog) => {
    if (playingRef.current) { stopPlayback(); await new Promise((r) => setTimeout(r, 150)); }
    stopRef.current = false;
    playingRef.current = true;
    setActiveProgression(prog.id);
    const ctx = getAudioCtx();
    const chords = prog.chords[voicing];
    let time = ctx.currentTime + 0.05;
    for (let i = 0; i < chords.length; i++) {
      if (stopRef.current) break;
      const dur = prog.duration / tempoRef.current;
      setPlayingChordIndex(i);
      playChord(ctx, chords[i].notes, dur, time);
      await new Promise((r) => setTimeout(r, dur * 1000));
      time += dur;
    }
    if (!stopRef.current) await new Promise((r) => setTimeout(r, 600));
    if (!stopRef.current) { playingRef.current = false; setActiveProgression(null); setPlayingChordIndex(-1); }
  }, [getAudioCtx, playChord, voicing, stopPlayback]);

  useEffect(() => {
    return () => { stopRef.current = true; nodesRef.current.forEach((n) => { try { n.stop(); } catch (e) {} }); if (audioCtxRef.current) audioCtxRef.current.close(); };
  }, []);

  const emotions = Object.keys(EMOTION_CONFIG);
  const cfg = EMOTION_CONFIG[selectedEmotion];
  const accent = cfg.color;
  const filtered = PROGRESSIONS.filter((p) => p.emotion === selectedEmotion);

  return (
    <div style={{ minHeight: "100vh", background: cfg.bg, color: "#e8e0d4", fontFamily: "'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif", padding: "40px 16px", transition: "background 0.8s ease" }}>
      <div style={{ maxWidth: 740, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{ fontSize: 11, letterSpacing: 6, textTransform: "uppercase", color: accent, marginBottom: 14, transition: "color 0.5s" }}>Cinematic Chord Explorer</div>
          <h1 style={{ fontSize: 34, fontWeight: 300, margin: 0, lineHeight: 1.2, color: "#f0ebe3" }}>The Sound of Emotion</h1>
          <p style={{ fontSize: 13.5, color: "#9a9080", marginTop: 10, lineHeight: 1.6, maxWidth: 520, margin: "10px auto 0" }}>
            Hear how film composers use chord relationships to evoke feelings. Toggle between triads and extensions to hear how voicing changes the emotional color.
          </p>
        </div>

        {/* Emotion Tabs */}
        <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 6, marginBottom: 16 }}>
          {emotions.map((em) => {
            const active = selectedEmotion === em;
            const c = EMOTION_CONFIG[em].color;
            return (
              <button key={em} onClick={() => { stopPlayback(); setSelectedEmotion(em); }}
                style={{ padding: "7px 16px", border: `1px solid ${active ? c : "rgba(255,255,255,0.1)"}`, borderRadius: 100, background: active ? c + "18" : "transparent", color: active ? c : "#c0b8b0", fontSize: 12, letterSpacing: 1.5, textTransform: "uppercase", cursor: "pointer", transition: "all 0.4s", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                {em}
              </button>
            );
          })}
        </div>

        {/* Voicing Toggle */}
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 32 }}>
          <div style={{ display: "flex", alignItems: "center", background: "rgba(255,255,255,0.04)", borderRadius: 100, border: "1px solid rgba(255,255,255,0.08)", padding: 3 }}>
            {[{ key: "triad", label: "Triads" }, { key: "seventh", label: "7ths & Extensions" }].map((v) => {
              const active = voicing === v.key;
              return (
                <button key={v.key} onClick={() => { stopPlayback(); setVoicing(v.key); }}
                  style={{ padding: "7px 18px", border: "none", borderRadius: 100, background: active ? accent + "25" : "transparent", color: active ? accent : "#c0b8b0", fontSize: 12, letterSpacing: 1, cursor: "pointer", transition: "all 0.3s", fontFamily: "inherit" }}>
                  {v.label}
                </button>
              );
            })}
          </div>
        </div>

        {/* Tempo Control */}
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 14, marginBottom: 32 }}>
          <span style={{ fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#9a9080" }}>Tempo</span>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 11, color: "#7a7268" }}>Slow</span>
            <input
              type="range"
              min="0.4"
              max="2.0"
              step="0.1"
              value={tempo}
              onChange={(e) => { const v = parseFloat(e.target.value); setTempo(v); tempoRef.current = v; }}
              style={{
                width: 140,
                height: 4,
                appearance: "none",
                WebkitAppearance: "none",
                background: `linear-gradient(to right, ${accent}66, ${accent})`,
                borderRadius: 4,
                outline: "none",
                cursor: "pointer",
                accentColor: accent,
              }}
            />
            <span style={{ fontSize: 11, color: "#7a7268" }}>Fast</span>
          </div>
          <span style={{ fontSize: 12, color: accent, minWidth: 36, textAlign: "center", fontVariantNumeric: "tabular-nums" }}>{tempo.toFixed(1)}x</span>
        </div>

        {/* Progressions */}
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          {filtered.map((prog) => {
            const isActive = activeProgression === prog.id;
            const isExpanded = expandedTheory === prog.id;
            const chords = prog.chords[voicing];
            return (
              <div key={prog.id} style={{ background: isActive ? `linear-gradient(135deg, ${prog.color}18, ${prog.color}0a)` : "rgba(0,0,0,0.3)", border: `1px solid ${isActive ? prog.color + "60" : "rgba(255,255,255,0.18)"}`, borderRadius: 16, padding: "22px 22px 18px", transition: "all 0.4s", }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                  <div>
                    <h2 style={{ margin: 0, fontSize: 20, fontWeight: 400, color: "#f0ebe3", letterSpacing: 0.3, display: "flex", alignItems: "center", gap: 8 }}>
                      {prog.name}
                      {chords.length > 4 && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 100, background: prog.color + "15", color: prog.color, letterSpacing: 1, fontWeight: 400 }}>{chords.length} chords</span>}
                    </h2>
                    <div style={{ fontSize: 11, color: prog.color, marginTop: 3, letterSpacing: 0.8 }}>{prog.composer} \u2014 <em>{prog.film}</em></div>
                  </div>
                  <button onClick={() => isActive ? stopPlayback() : playProgression(prog)}
                    style={{ width: 44, height: 44, borderRadius: "50%", border: `1.5px solid ${prog.color}`, background: isActive ? prog.color + "22" : "transparent", color: prog.color, fontSize: isActive ? 13 : 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.3s" }}>
                    {isActive ? "\u25A0" : "\u25B6"}
                  </button>
                </div>

                <p style={{ fontSize: 13, lineHeight: 1.65, color: "#a09888", margin: "10px 0 14px" }}>{prog.description}</p>

                {/* Chord cards */}
                <div style={{ display: "flex", gap: chords.length > 5 ? 3 : 5, marginBottom: 12, flexWrap: chords.length > 6 ? "wrap" : "nowrap" }}>
                  {chords.map((chord, ci) => {
                    const isPlaying = isActive && playingChordIndex === ci;
                    const isLong = chords.length > 5;
                    return (
                      <div key={ci} style={{ flex: chords.length > 6 ? "0 0 calc(25% - 3px)" : 1, minWidth: 0, textAlign: "center", padding: isLong ? "8px 2px" : "10px 3px", borderRadius: 10, background: isPlaying ? prog.color + "20" : "rgba(255,255,255,0.025)", border: `1px solid ${isPlaying ? prog.color + "55" : "rgba(255,255,255,0.04)"}`, transition: "all 0.2s", transform: isPlaying ? "scale(1.04)" : "scale(1)" }}>
                        <div style={{ fontSize: isLong ? 8.5 : 9.5, color: "#7a7268", letterSpacing: 1, textTransform: "uppercase", marginBottom: 3 }}>{chord.roman}</div>
                        <div style={{ fontSize: isLong ? 13 : 15, fontWeight: 300, color: isPlaying ? prog.color : "#d0c8bc", transition: "color 0.2s", letterSpacing: 0.2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{chord.name}</div>
                      </div>
                    );
                  })}
                </div>

                {/* Voicing note */}
                <div style={{ padding: "10px 14px", background: voicing === "triad" ? "rgba(200,180,140,0.05)" : "rgba(100,150,200,0.05)", borderRadius: 8, fontSize: 12, lineHeight: 1.7, color: "#a09888", marginBottom: 10, borderLeft: `2px solid ${voicing === "triad" ? "#8a7a60" : "#5a7a9a"}33` }}>
                  <span style={{ fontSize: 9.5, letterSpacing: 2, textTransform: "uppercase", color: voicing === "triad" ? "#8a7a60" : "#5a7a9a" }}>{voicing === "triad" ? "Triad version" : "Extended version"}</span><br />
                  {voicing === "triad" ? prog.triadNote : prog.seventhNote}
                </div>

                {/* Theory expand */}
                <button onClick={() => setExpandedTheory(isExpanded ? null : prog.id)}
                  style={{ background: "none", border: "none", color: prog.color, fontSize: 12, cursor: "pointer", padding: 0, fontFamily: "inherit", letterSpacing: 0.5, opacity: 0.9 }}>
                  {isExpanded ? "Hide" : "Show"} deeper theory {isExpanded ? "\u2191" : "\u2193"}
                </button>
                {isExpanded && (
                  <div style={{ marginTop: 10, padding: "12px 16px", background: "rgba(0,0,0,0.3)", borderRadius: 10, fontSize: 12.5, lineHeight: 1.8, color: "#b8b0a4", borderLeft: `3px solid ${prog.color}33` }}>
                    {prog.theory}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div style={{ textAlign: "center", marginTop: 36, fontSize: 11.5, color: "#5a5248", lineHeight: 1.7 }}>
          {PROGRESSIONS.length} progressions across {emotions.length} emotions. Toggle Triads / 7ths to hear how voicing changes emotional character while harmonic structure stays the same.
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CinematicChords));
  </script>
</body>
</html>
